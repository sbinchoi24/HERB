<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탕전 | 경희라피엘한의원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F6F8FA;
    --card:#FFFFFF;
    --ink:#191F28;
    --ink2:#4E5968;
    --ink3:#8B95A1;
    --line:#E9EDF1;
    --blue:#3182F6;
    --blue-mid:#A8D0F5;
    --blue-d:#5B9BD5;
    --blue-bg:#EAF2FE;
    --orange:#E8934F;
    --orange-mid:#F5C99A;
    --orange-d:#E8934F;
    --orange-bg:#FDEEE1;
    --anchor:#6B7684;
    --anchor-bg:#EDF0F3;
    --red:#F04452;
    --red-bg:#FEECEE;
    --amber:#F59F00;
    --amber-bg:#FFF4E0;
    --green:#2FAE66;
    --green-mid:#B7E8C7;
    --green-d:#249256;
    --green-bg:#E5F7EC;
    --r:20px;
    --r-sm:10px;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
    --shell:1800px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:0 20px 80px;
    line-height:1.4;
  }
  .wrap{width:min(var(--shell), calc(100% - 44px));margin:0 auto}

  /* 사이트 최상단: 흰 배경 바 + 병원명 + 관리자 메뉴 (참고 사이트의 .top 과 동일한 톤/정렬 공식) */
  .site-top-bar{
    margin:0 -20px 28px;height:72px;
    background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    padding-left:max(14px, calc((100vw - (var(--shell) + 60px))/2));
    padding-right:max(22px, calc((100vw - var(--shell))/2));
  }
  .site-top{display:flex;align-items:center;justify-content:space-between;width:100%}
  .site-name{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-.2px}
  .site-admin{display:flex;align-items:center;gap:10px}
  .lock-hint{display:none;align-items:center;font-size:12.5px;color:var(--ink3);font-weight:600;white-space:nowrap}
  .today-badge{
    background:#F2F7FF;color:#286AB9;border-radius:var(--r-sm);
    padding:11px 18px;font-weight:700;font-size:15px;white-space:nowrap;
  }

  /* 페이지 헤더: 큰 제목 + 오늘 날짜 / 우측 액션 버튼 */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .page-head-date{color:var(--ink3);font-size:13px;font-weight:600;margin-top:2px}
  .page-head-actions{display:flex;gap:8px}

  /* 캘린더(좌) + 등록 카드(우) 2단 레이아웃 */
  .main-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
  @media (max-width:980px){.main-grid{grid-template-columns:1fr}}
  .side-panel{position:sticky;top:16px}
  .add-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}
  .add-card-title{font-size:16px;font-weight:800;margin-bottom:14px;letter-spacing:-.2px}

  /* 캘린더 상단: 필터 줄 + 가운데 정렬된 '‹ 2026년 7월 ›' 줄 */
  .cal-head-top{display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:14px 22px 0}
  .cal-title-row{display:flex;align-items:center;justify-content:center;gap:28px;height:66px;border-bottom:1px solid var(--line)}
  .nav-arrow{
    width:40px;height:40px;border-radius:13px;border:none;cursor:pointer;
    background:#F2F4F6;color:var(--ink2);font-size:25px;font-weight:400;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .nav-arrow:hover{background:#E5E8EB}

  h1{font-size:38px;font-weight:800;letter-spacing:-.5px}
  .sub{color:var(--ink3);font-size:14px;margin-top:4px;font-weight:500}

  /* 페이지 헤더: 큰 제목 + 우측 상단 툴바(근무표의 '월간/직원별'과 동일한 위치/스타일) */
  .page-head{position:relative;margin-bottom:20px}
  .toolbar{position:absolute;right:0;top:8px;display:flex;align-items:center;gap:9px}
  .views{display:flex;background:var(--line);padding:4px;border-radius:13px}
  .views button{border:none;background:transparent;border-radius:9px;padding:10px 16px;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;transition:all .15s}
  .views button.on{background:#fff;color:var(--ink)}

  /* add form */
  .add{
    background:var(--card);border-radius:var(--r);padding:16px;
    display:flex;gap:10px;align-items:center;box-shadow:var(--shadow);flex-wrap:wrap;
    margin-bottom:16px;
  }
  .add label{font-size:12px;font-weight:700;color:var(--ink3);margin-right:2px}
  .add input,.add select{
    font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);
    border:1.5px solid var(--line);border-radius:var(--r-sm);
    padding:10px 12px;background:#fff;outline:none;transition:border-color .15s;
  }
  .add input:focus,.add select:focus{border-color:var(--blue)}
  .add input[type=text]{width:120px}
  .btn{
    font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
    border:none;border-radius:var(--r-sm);padding:11px 18px;
    background:var(--blue);color:#fff;transition:background .15s,transform .05s;
  }
  .btn:hover{background:var(--blue-d)}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--anchor-bg);color:var(--ink2)}
  .btn.ghost:hover{background:#E1E5EA}
  /* 세그 버튼과 높이를 맞춘 작은 "돌아가기" 버튼 */
  .btn-back{
    font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
    border:none;border-radius:8px;padding:7px 15px;
    background:var(--red-bg);color:var(--red);transition:background .15s;
  }
  .btn-back:hover{background:#FADADE}

  /* alert banner */
  .alert{
    background:var(--red-bg);border:1.5px solid #FADADE;border-radius:var(--r);
    padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;
    animation:drop .25s ease;
  }
  @keyframes drop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .alert .dot{width:9px;height:9px;border-radius:50%;background:var(--red);flex:none;box-shadow:0 0 0 4px rgba(240,68,82,.15)}
  .alert b{color:var(--red);font-weight:800;font-size:15px}
  .alert span{color:var(--ink2);font-size:14px;font-weight:600}

  /* calendar shell */
  .cal{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px}
  .cal-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
  .nav{display:flex;gap:6px}
  .head-right{display:flex;align-items:center;gap:12px}
  .seg{display:flex;background:var(--bg);border-radius:10px;padding:3px}
  .seg button{border:none;background:none;padding:7px 15px;border-radius:8px;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all .15s}
  .seg button.on{background:var(--ink);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  /* 등록 폼의 '종류' 토글만 종류별 테마색으로 선택 표시 */
  #typeToggle button.on[data-type="일반"]{background:var(--blue);color:#fff}
  #typeToggle button.on[data-type="다이어트"]{background:var(--orange);color:#fff}
  #typeToggle button.on[data-type="상비약"]{background:var(--green);color:#fff}
  .nav button{
    width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;
    background:var(--bg);color:var(--ink2);font-size:18px;font-weight:700;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .nav button:hover{background:#E5E8EB}

  .dow{display:grid;grid-template-columns:repeat(7,1fr)}
  .dow div{text-align:center;padding:10px 0;font-size:12px;font-weight:700;color:var(--ink3)}
  .dow div:first-child{color:#E5535F}

  .grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cell{
    min-height:150px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:8px 8px 10px;position:relative;transition:background .12s;
  }
  .cell:nth-child(7n){border-right:none}
  .cell.mute{background:#FBFCFD}
  .cell.mute .num{color:var(--ink3);opacity:.5}
  .cell.today .num{background:var(--blue);color:#fff}
  .cell.over{background:var(--red-bg)}
  .cell.dragover{background:var(--blue-bg);box-shadow:inset 0 0 0 2px var(--blue)}
  .num{
    font-size:13px;font-weight:700;color:var(--ink2);
    width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;
    border-radius:8px;margin-bottom:4px;
  }
  .cell.sun .num{color:#E5535F}

  .cnt{
    position:absolute;top:8px;right:8px;font-size:10px;font-weight:800;
    padding:2px 7px;border-radius:20px;background:var(--anchor-bg);color:var(--ink2);
  }
  .cnt.warn{background:var(--amber-bg);color:var(--amber)}
  .cnt.bad{background:var(--red);color:#fff;box-shadow:0 0 0 3px rgba(240,68,82,.15)}

  /* chips — 탕전만 블럭 전체를 색으로 채우고, 나머지는 흰 배경 + 점 하나로 종류(한약=파랑/다이어트=주황) 표시 */
  .chips{display:flex;flex-direction:column;gap:7px;margin-top:3px}
  .chip{
    display:flex;align-items:center;gap:6px;cursor:grab;user-select:none;position:relative;
    background:#fff;border:none;
    border-radius:8px;padding:9px 11px;font-size:11.5px;font-weight:700;
    box-shadow:0 1px 2px rgba(0,0,0,.05);
    transition:transform .1s,box-shadow .1s;
  }
  .chip:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1)}
  .chip:active{cursor:grabbing}
  .chip.dragging{opacity:.4}
  .chip .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .chip .who{color:var(--ink);font-weight:800;white-space:nowrap}
  .chip .role{color:var(--ink2);font-weight:600;white-space:nowrap}
  /* 흰 배경(비-탕전) 칩은 글자색도 종류별 테마색으로 (진하게) */
  .chip.fam-gen .who{color:#0B4DBF}
  .chip.fam-gen .role{color:#1B64DA}
  .chip.fam-diet .who{color:#9A5116}
  .chip.fam-diet .role{color:#B85C1F}
  .chip.fam-stock .who{color:#14562E}
  .chip.fam-stock .role{color:#1F7A45}
  .chip .day{margin-left:auto;color:var(--blue);font-weight:800;font-size:10px}

  /* 점 색: 한약=파랑, 다이어트=주황 (처방·HS·IS 등 탕전이 아닌 모든 칩) */
  .chip .dot.dot-gen{background:var(--blue)}
  .chip .dot.dot-diet{background:var(--orange)}
  .chip .dot.dot-stock{background:var(--green)}
  /* 탕전(채움) 칩은 점을 투명하게 — 자리는 그대로 차지해서 이름 위치를 다른 칩과 맞춤(고정폭) */
  .chip .dot.dot-hidden{background:transparent}
  /* 탕전만 칩 전체를 옅게 채움 */
  .chip.fill-gen{background:var(--blue-mid)}
  .chip.fill-diet{background:var(--orange-mid)}
  .chip.fill-stock{background:var(--green-mid)}
  .chip.moved{background:var(--red-bg)}
  .chip.moved .dot{background:var(--red)}
  .chip.moved .role,.chip.moved .day{color:var(--red)}
  /* HS/IS(전화상담) 표시 — 옅은 빨간 배경 + 진한 빨간 글자로, 우측 끝에 "전화상담" 표기 */
  .chip.phone{background:#F7B4BA}
  .chip.phone .who{color:#8C121C}
  .chip.phone .role{color:#B3202C}
  .chip .phone-tag{margin-left:auto;color:#8C121C;font-weight:800;font-size:10px;white-space:nowrap}
  /* 이동 툴팁 */
  .chip[data-tip]:hover::after{
    content:attr(data-tip);position:absolute;left:0;bottom:calc(100% + 7px);
    background:var(--ink);color:#fff;font-size:11px;font-weight:600;white-space:nowrap;
    padding:6px 10px;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,.18);
    z-index:60;pointer-events:none;
  }
  .chip[data-tip]:hover::before{
    content:'';position:absolute;left:13px;bottom:calc(100% + 2px);
    border:5px solid transparent;border-top-color:var(--ink);z-index:60;pointer-events:none;
  }

  /* 환자 이름 우클릭 메뉴 */
  .ctx-menu{
    position:fixed;display:none;background:#fff;border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.18);padding:6px;z-index:300;
  }
  .ctx-menu button{
    display:block;width:100%;white-space:nowrap;text-align:left;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);
    border:none;background:none;padding:9px 14px;border-radius:7px;cursor:pointer;
  }
  .ctx-menu button:hover{background:var(--bg)}
  .ctx-menu button.danger{color:var(--red)}

  /* 픽업 이동 선택 모달 */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(15,20,25,.45);
    display:none;align-items:center;justify-content:center;z-index:400;
  }
  .modal-overlay.open{display:flex}
  .modal-card{
    background:#fff;border-radius:16px;padding:22px;width:320px;max-width:88vw;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:18px;line-height:1.4}
  .modal-btn{
    display:block;width:100%;padding:13px;border:none;border-radius:12px;
    font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
    margin-bottom:8px;transition:background .15s;
  }
  .modal-btn.primary{background:var(--blue);color:#fff}
  .modal-btn.primary:hover{background:var(--blue-d)}
  .modal-btn.secondary{background:var(--anchor-bg);color:var(--ink2)}
  .modal-btn.secondary:hover{background:#E1E5EA}
  .modal-cancel{
    display:block;width:100%;text-align:center;margin-top:2px;padding:8px;
    font-family:inherit;font-size:13px;font-weight:600;color:var(--ink3);
    border:none;background:none;cursor:pointer;
  }
  .modal-cancel:hover{color:var(--ink2)}
  .modal-check{
    display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;
    color:var(--ink2);margin-bottom:14px;cursor:pointer;
  }
  .modal-check input{width:17px;height:17px;cursor:pointer;accent-color:var(--blue)}
  .modal-card.wide{width:920px;max-height:86vh;overflow-y:auto}
  .ref-note{font-size:11.5px;color:var(--ink3);margin-top:8px;line-height:1.5}
  /* 처방일부터 하루하루 다 펼친 표 — 한 행 = 하루가 항상 유지되도록, 구간이 바뀌어도
     별도 행을 끼우지 않고 그 날의 행 자체에 굵은 윗선 + 구간 이름표만 붙인다.
     여백은 촘촘하게, 일반/다이어트는 좌우 2단으로 나란히 비교. */
  .ref-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  .ref-col-head{
    font-size:13px;font-weight:800;color:#fff;padding:8px 12px;border-radius:8px 8px 0 0;
    background:var(--blue-d);
  }
  .ref-col-head.ref-diet{background:var(--orange-d)}
  .ref-table-daily{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--line);border-top:none}
  .ref-table-daily td{padding:3px 10px;border-bottom:1px solid var(--line);color:var(--ink3);font-weight:500;line-height:1.5}
  .ref-table-daily tr:last-child td{border-bottom:none}
  .ref-table-daily td:first-child{width:74px;white-space:nowrap;font-weight:700;color:var(--ink2);position:relative}
  .ref-table-daily td:last-child{width:26px;text-align:center;font-weight:800;color:var(--blue-d)}
  .ref-table-daily tr.ref-hit{background:var(--blue-bg)}
  .ref-table-daily tr.ref-hit td{color:var(--ink);font-weight:800}
  .ref-table-daily tr.ref-hit td:first-child{color:var(--blue-d)}
  .ref-table-daily tr.ref-hit td:last-child{color:var(--blue-d)}
  .ref-table-daily.ref-diet td:last-child{color:var(--orange-d)}
  .ref-table-daily.ref-diet tr.ref-hit{background:var(--orange-bg)}
  .ref-table-daily.ref-diet tr.ref-hit td:first-child{color:var(--orange-d)}
  .ref-table-daily.ref-diet tr.ref-hit td:last-child{color:var(--orange-d)}
  /* 구간이 바뀌는 첫 날의 행 — 새 행을 추가하지 않고 굵은 윗선으로만 표시(소제목 없이) */
  .ref-table-daily tr.ref-phase-start td{border-top:2.5px solid var(--ink2)}

  /* legend */
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;padding:0 4px}
  .legend div{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink2)}
  .legend i{width:12px;height:12px;border-radius:4px;display:inline-block}
  .note{margin-top:10px;padding:0 4px;font-size:12px;color:var(--ink3);font-weight:500}

  /* 상세 패널 */
  .panel{
    position:fixed;top:0;right:0;height:100vh;width:560px;max-width:92vw;
    background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.12);
    transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:200;padding:24px 22px;overflow-y:auto;
  }
  .panel.open{transform:none}
  .p-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
  .p-name{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .p-tag{display:inline-block;margin-top:7px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
  .t-gen{background:var(--blue-bg);color:var(--blue-d)}
  .t-diet{background:var(--orange-bg);color:var(--orange)}
  .t-stock{background:var(--green-bg);color:var(--green-d)}
  .p-x{border:none;background:var(--bg);width:34px;height:34px;border-radius:10px;font-size:22px;color:var(--ink2);cursor:pointer;line-height:1}
  .p-x:hover{background:#E5E8EB}
  .p-list{display:flex;flex-direction:column;margin-top:18px}
  /* 명칭 | 복용 며칠째 | 날짜(수정 가능) — 행이 달라도 각 열 폭이 고정돼 정렬이 맞음 */
  .p-row{display:grid;grid-template-columns:14px 1fr 88px 116px;align-items:center;column-gap:10px;padding:15px 4px;border-bottom:1px solid var(--line)}
  .p-row:last-child{border-bottom:none}
  .p-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .p-dot.dot-gen{background:var(--blue)}
  .p-dot.dot-diet{background:var(--orange)}
  .p-dot.dot-stock{background:var(--green)}
  .p-main{min-width:0}
  .p-label{font-size:15px;font-weight:700;color:var(--ink)}
  .p-dosecol{display:flex}
  .p-day{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-bg);padding:2px 7px;border-radius:12px;white-space:nowrap}
  .p-move{font-size:12px;font-weight:600;color:var(--red);margin-top:4px}
  .p-date{text-align:right}
  .p-date-input{
    font-family:inherit;font-size:13px;font-weight:800;color:var(--ink);

<script>
/* ---------- 날짜 유틸 ---------- */
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parse=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const addDays=(s,n)=>{const d=parse(s);d.setDate(d.getDate()+n);return ymd(d);};
const diff=(a,b)=>Math.round((parse(a)-parse(b))/86400000);

/* ---------- 종류별 스키마 ----------
   kind: anchor(고정점) / brew(탕전,카운트) / consult(상담·픽업)
   일반:   처방(T) → 1차탕전 T+1 → 픽업(탕전+2일,안 보임) → 복용시작(픽업+1일) / HS(탕전+11일) → 다음 탕전(HS+1일)
           (이후 차수도 동일 패턴 반복)
   다이어트: 처방(T) → 매 차수 탕전 → 픽업(+2일) → 복용시작(픽업+1일) → 복용IS → 다음 탕전
            1·2차는 다음 탕전까지 14일분, 3차부터는 15일분. 픽업·복용시작은 캘린더엔 안 보이고 패널에서만 표시.
*/
const SCHEMA={
  일반:{
    minCycles:2,
    // 1차: 탕전→픽업(+1일)→복용시작(픽업+1일)→HS(복용시작+10일)→2차 탕전(HS+1일)
    // 2차부터: 픽업=직전 복용시작+14일 (탕전-픽업 간격이 1차만 다르고 이후는 규칙적으로 반복)
    build(T,cycles){
      const n=Math.max(cycles||2,2);
      const data={처방:T};
      const order=['처방'];
      const meta={처방:{label:'처방',kind:'anchor'}};
      let brewK=addDays(T,1),prevStart=null;
      for(let k=1;k<=n;k++){
        const bK='brew'+k,pK='pickup'+k,sK='start'+k,hK='hs'+k;
        const pickupDate = k===1 ? addDays(brewK,1) : addDays(prevStart,14);
        const startDate=addDays(pickupDate,1); // 복용 시작 = 픽업 다음날
        const hsDate=addDays(startDate,10);
        data[bK]=brewK;data[pK]=pickupDate;data[sK]=startDate;data[hK]=hsDate;
        order.push(bK,pK,sK,hK);
        meta[bK]={label:`${k}차 탕전`,kind:'brew'};
        meta[pK]={label:`${k}차 픽업`,kind:'anchor'};
        meta[sK]={label:`${k}차 복용 시작`,kind:'anchor'};
        meta[hK]={label:`${k}차 복용 HS`,kind:'consult'};
        prevStart=startDate;
        brewK=addDays(hsDate,1);
      }
      return {order,meta,data};
    }
  },
  다이어트:{
    minCycles:2,
    // 규칙: 1차 픽업=탕전+2일. 이후 픽업(N+1차)=직전 차수 복용 14일차(1·2차분) 또는 15일차(3차분부터).
    //       복용시작=픽업+1일. 복용IS=복용시작+7일(=복용 8일차, 전 차수 공통).
    //       다음 탕전=이번 차수 복용IS 다음날.
    build(T,cycles){
      const n=Math.max(cycles||2,2);
      const data={처방:T};
      const order=['처방'];
      const meta={처방:{label:'처방',kind:'anchor'}};
      let brewK=addDays(T,1),prevStart=null,prevBatchDays=null;
      for(let k=1;k<=n;k++){
        const bK='brew'+k,pK='pickup'+k,sK='start'+k,iK='is'+k;
        const pickupDate = k===1 ? addDays(brewK,2) : addDays(prevStart,prevBatchDays-1);
        const startDate=addDays(pickupDate,1);
        const isDate=addDays(startDate,7); // 복용 8일차 고정
        data[bK]=brewK;data[pK]=pickupDate;data[sK]=startDate;data[iK]=isDate;
        order.push(bK,pK,sK,iK);
        meta[bK]={label:`${k}차 탕전`,kind:'brew'};
        meta[pK]={label:`${k}차 픽업 IS`,kind:'consult'};
        meta[sK]={label:`${k}차 복용 시작`,kind:'anchor'};
        meta[iK]={label:`${k}차 복용 IS`,kind:'consult'};
        prevStart=startDate;
        prevBatchDays=k<=2?14:15; // 1·2차=14일분, 3차부터=15일분
        brewK=addDays(isDate,1); // 다음 탕전 = 이번 복용IS 다음날
      }
      return {order,meta,data};
    }
  },
  상비약:{
    minCycles:0,
    // 상비약 탕전: 반복 패턴 없이 그 날 하루만 존재하는 단발성 탕전. 처방일=탕전일 그 자체.
    build(T){
      return {order:['brew1'],meta:{brew1:{label:'상비약 탕전',kind:'brew'}},data:{brew1:T}};
    }
  }
};

// 종류 색: 한약(일반)=파랑, 다이어트=주황, 상비약=초록으로 고정. 탕전만 칩 전체를 채우고 나머지는 점 하나로만 표시.
function famOf(type){
  if(type==='다이어트')return 'diet';
  if(type==='상비약')return 'stock';
  return 'gen';
}
function isBrewKind(kind){return kind==='brew';}
// 케이스 하나의 현재 스키마(순번/라벨/처방일 기준 정석 날짜)를 구성
function schemaBuild(c){
  return SCHEMA[c.type].build(c.처방,c.cycles||2);
}
// 전화상담(내원 X) 표시 여부 — HS(일반) / 픽업 IS·복용 IS(다이어트) 등 kind==='consult'인 날에만 사용
function phoneOn(c,role){return !!(c.phone&&c.phone[role]);}
const MAX=6;

// 순번상 "바로 앞 일정 + 정석 간격"과 실제 날짜를 비교해 이동 여부 판단.
// 앞 일정이 밀리면서 함께 같은 간격으로 밀린 칩은 moved=false,
// 그 간격 자체가 깨진 칩만 moved=true 가 된다.
// 픽업 바로 다음 일정(복용시작)은 두 가지 기준을 모두 확인한다:
// (1) 픽업이 아닌 마지막 일정 기준 — 픽업만 단독으로 옮겨서 뒤는 그대로인 경우
// (2) 바로 앞 픽업 기준 — 픽업과 함께 연쇄로 같이 옮겨진 경우
// 둘 중 하나라도 맞으면 moved=false. (픽업 자신은 그대로 브루 기준으로 판단)
function computeChain(c,sch){
  sch=sch||schemaBuild(c);
  const roles=sch.order;
  const info={};
  let prevActual=null,prevRole=null,altActual=null,altRole=null;
  roles.forEach((role,i)=>{
    const actual=c[role];
    let expected=actual,moved=false;
    if(i>0){
      const gapA=diff(sch.data[role],sch.data[prevRole]);
      const expectedA=addDays(prevActual,gapA);
      let matched=(actual===expectedA),best=expectedA;
      if(altRole){
        const gapB=diff(sch.data[role],sch.data[altRole]);
        const expectedB=addDays(altActual,gapB);
        if(actual===expectedB){matched=true;best=expectedB;}
      }
      expected=best;moved=!matched;
    }
    info[role]={actual,expected,moved,delta:diff(actual,expected)};
    if(role.startsWith('pickup')){altActual=actual;altRole=role;}
    else{prevActual=actual;prevRole=role;altActual=null;altRole=null;}
  });
  return info;
}

// 각 차수의 실제 "N차 복용 시작"(startN) 일자를 기준으로 그 뒤로 며칠째인지 계산.
// (일반은 탕전+2일, 다이어트는 픽업+1일=탕전+3일 — 스키마가 정한 실제 시작일을 그대로 사용,
//  단 다음 차수 "픽업 IS"는 아직 이번 차수 복용이 시작 전이라 직전 차수 복용 며칠째로 표시.
//  딜레이된 실제 날짜 기준으로 계산)
function computeDoseDays(c,sch){
  sch=sch||schemaBuild(c);
  const roles=sch.order;
  const info={};
  let brewNo=0,start=null,prevStart=null,prevNo=0;
  roles.forEach(role=>{
    const m=sch.meta[role];
    if(m.kind==='brew'){prevStart=start;prevNo=brewNo;brewNo++;start=null;}
    if(role==='start'+brewNo)start=c[role];
    if(role.startsWith('pickup')){
      if(prevStart){
        const day=diff(c[role],prevStart)+1;
        if(day>=1)info[role]={no:prevNo,day};
      }
      return;
    }
    if(brewNo>0&&start){
      const day=diff(c[role],start)+1;
      if(day>=1)info[role]={no:brewNo,day};
    }
  });
  return info;
}

/* ---------- 같은 날 여러 칩의 표시 순서(수동 정렬) ----------
   날짜별로 사용자가 드래그로 바꾼 순서를 Supabase의 day_chip_order 테이블에 저장해서
   다른 기기·다른 브라우저에서도 같은 순서로 보이게 한다. */
let chipOrder = {};
async function loadChipOrder(){
  try{
    const {data,error} = await sb.from('day_chip_order').select('*');
    if(error) throw error;
    const map = {};
    (data||[]).forEach(row=>{ map[row.date] = row.order_keys || []; });
    chipOrder = map;
  }catch(err){
    console.error('칩 순서 불러오기 실패:',err);
  }
}
async function persistChipOrder(date, orderKeys){
  try{
    const {error} = await sb.from('day_chip_order').upsert({date, order_keys: orderKeys}, {onConflict:'date'});
    if(error) throw error;
  }catch(err){
    console.error('칩 순서 저장 실패:',err);
  }
}
function reorderWithinDay(date, dragKey, targetKey, clientY, targetEl){
  const cellChips = Array.from(document.querySelectorAll(`.cell[data-date="${date}"] .chip`))
    .map(el=>el.dataset.cid+':'+el.dataset.role);
  let order = chipOrder[date] ? chipOrder[date].slice() : cellChips.slice();
  cellChips.forEach(k=>{ if(!order.includes(k)) order.push(k); });
  order = order.filter(k=>k!==dragKey);
  const targetIdx = order.indexOf(targetKey);
  const rect = targetEl.getBoundingClientRect();
  const insertBefore = (clientY - rect.top) < rect.height/2;
  const insertAt = targetIdx<0 ? order.length : (insertBefore ? targetIdx : targetIdx+1);
  order.splice(insertAt, 0, dragKey);
  chipOrder[date] = order;
  render();
  persistChipOrder(date, order);
}

/* ---------- 상태 ---------- */
let cases=[], uid=1, selected=null, filter='all', isolate=null;
const now=new Date();
let vy=now.getFullYear(), vm=now.getMonth();

// 생년월일 6자리(YYMMDD) 입력값 -> "YY.MM.DD" 표시용 포맷
function formatDob(dob){
  if(!dob||dob.length!==6)return dob||'';
  return `${dob.slice(0,2)}.${dob.slice(2,4)}.${dob.slice(4,6)}`;
}

/* ---------- Supabase 연동 ----------
   cases 테이블: id,type,name,dob,prescribed_date,cycles,memo,phone_consult(jsonb, 신규)

function makeStubClient(){
  const err={message:'Supabase 클라이언트를 불러오지 못했습니다'};
  const chain={
    select:()=>chain,insert:()=>chain,upsert:()=>chain,update:()=>chain,delete:()=>chain,
    eq:()=>chain,order:()=>chain,
    single:()=>Promise.resolve({data:null,error:err}),
    then:(resolve)=>Promise.resolve({data:[],error:err}).then(resolve),
  };
  return {from:()=>chain};
}
let sb;
try{
  if(!window.supabase)throw new Error('supabase-js SDK 로드 실패(CDN 차단/네트워크 문제 등)');
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
}catch(err){
  console.error('Supabase 초기화 실패, 로컬 모드로 동작:',err);
  sb=makeStubClient();
}
const CORE_FIELDS=['id','type','name','dob','처방','cycles','memo','phone'];

async function loadFromDB(){
  try{
    const [{data:caseRows,error:e1},{data:dateRows,error:e2}]=await Promise.all([
      sb.from('cases').select('*').order('id'),
      sb.from('case_dates').select('*'),
    ]);
    if(e1||e2)throw e1||e2;
    // 데이터가 하나도 없어도 임의로 예시 환자를 만들지 않고 빈 캘린더 그대로 둔다.
    cases=caseRows.map(r=>({id:r.id,type:r.type,name:r.name,dob:r.dob,처방:r.prescribed_date,cycles:r.cycles,memo:r.memo||'',phone:r.phone_consult||{}}));
    uid=Math.max(0,...caseRows.map(r=>r.id))+1;
    dateRows.forEach(dr=>{
      const c=cases.find(x=>x.id===dr.case_id);
      if(c)c[dr.role]=dr.date;
    });
  }catch(err){
    console.error('Supabase 연결 실패, 로컬 임시 데이터로 표시:',err);
    seed();
  }
}
async function persistNewCase(c){
  try{
    const{data,error}=await sb.from('cases').insert({
      type:c.type,name:c.name,dob:c.dob,prescribed_date:c.처방,cycles:c.cycles||2,memo:c.memo||'',phone_consult:{}
    }).select().single();
    if(error)throw error;
    c.id=data.id;
    const rows=Object.keys(c).filter(k=>!CORE_FIELDS.includes(k)).map(role=>({case_id:c.id,role,date:c[role]}));
    if(rows.length){const{error:e2}=await sb.from('case_dates').insert(rows);if(e2)throw e2;}
    render();
  }catch(err){console.error('환자 저장 실패:',err);}
}
async function persistDates(caseId,roleDateMap){
  const rows=Object.entries(roleDateMap).map(([role,date])=>({case_id:caseId,role,date}));
  if(!rows.length)return;
  try{const{error}=await sb.from('case_dates').upsert(rows,{onConflict:'case_id,role'});if(error)throw error;}
  catch(err){console.error('일정 저장 실패:',err);}
}
async function persistCycles(caseId,cycles){
  try{const{error}=await sb.from('cases').update({cycles}).eq('id',caseId);if(error)throw error;}
  catch(err){console.error('차수 저장 실패:',err);}
}
async function persistMemo(caseId,memo){
  try{const{error}=await sb.from('cases').update({memo}).eq('id',caseId);if(error)throw error;}
  catch(err){console.error('메모 저장 실패:',err);}
}
async function persistPhone(caseId,phone){
  try{const{error}=await sb.from('cases').update({phone_consult:phone}).eq('id',caseId);if(error)throw error;}
  catch(err){console.error('전화상담 표시 저장 실패:',err);}
}
async function persistDeleteCase(caseId){
  try{const{error}=await sb.from('cases').delete().eq('id',caseId);if(error)throw error;} // case_dates는 FK cascade로 같이 삭제됨
  catch(err){console.error('환자 삭제 실패:',err);}
}

function seed(){
  // 예시는 건보 1명, 다이어트 1명만 — 헷갈리지 않게 최소로. name은 차트 번호 예시.
  const base=ymd(new Date(now.getFullYear(),now.getMonth(),1));
  [['일반',addDays(base,2),'10234','850314'],
   ['다이어트',addDays(base,1),'20567','900722'],
  ].forEach(([t,d,n,dob])=>{
    const c={id:uid++,type:t,name:n,dob,memo:'',phone:{},처방:d};
    Object.assign(c,schemaBuild(c).data);
    cases.push(c);
  });
}

/* ---------- 드래그 이동 ---------- */
let pendingMove=null;
// role부터 뒤 전부 같은 간격으로 이동시키고, 바뀐{role:date} 맵을 돌려준다(DB 저장용)
function cascadeShift(c,role,dl){
  const roles=schemaBuild(c).order;
  const idx=roles.indexOf(role);
  const changed={};
  roles.slice(idx).forEach(k=>{c[k]=addDays(c[k],dl);changed[k]=c[k];});
  return changed;
}
function moveChip(cid,role,newDate){
  if(!requireEdit())return;
  const c=cases.find(x=>x.id===cid);if(!c)return;
  const dl=diff(newDate,c[role]);if(dl===0)return;
  // 픽업은 "약만 일찍/늦게 받아간" 것처럼 단독으로 바뀔 수도 있어서 예쁜 선택 모달로 물어본다.
  if(role.startsWith('pickup')){
    pendingMove={cid,role,newDate};
    document.getElementById('moveBrewChk').checked=false;
    document.getElementById('moveAfterChk').checked=false;
    document.getElementById('moveModal').classList.add('open');
    return;
  }
  const changed=cascadeShift(c,role,dl);
  render();
  persistDates(c.id,changed);
}
// 픽업 role(pickupN) -> 같은 차수의 탕전 role(brewN)
function brewRoleOf(role){return role.replace('pickup','brew');}
function resolveMove(){
  if(!requireEdit()){cancelMove();return;}
  if(pendingMove){
    const {cid,role,newDate}=pendingMove;
    const c=cases.find(x=>x.id===cid);
    const moveBrew=document.getElementById('moveBrewChk').checked;
    const moveAfter=document.getElementById('moveAfterChk').checked;
    if(c){
      const sch=schemaBuild(c);
      const dl=diff(newDate,c[role]);
      const changed={};
      c[role]=newDate;changed[role]=newDate; // 픽업 자신은 항상 이동
      if(moveBrew){
        const bRole=brewRoleOf(role);
        if(bRole in c){
          const gap=diff(sch.data[role],sch.data[bRole]); // 탕전→픽업 정석 간격
          c[bRole]=addDays(newDate,-gap);
          changed[bRole]=c[bRole];
        }
      }
      if(moveAfter){
        const idx=sch.order.indexOf(role);
        sch.order.slice(idx+1).forEach(k=>{c[k]=addDays(c[k],dl);changed[k]=c[k];});
      }
      persistDates(c.id,changed);
    }
  }
  pendingMove=null;
  document.getElementById('moveModal').classList.remove('open');
  render();
}
function cancelMove(){
  pendingMove=null;
  document.getElementById('moveModal').classList.remove('open');
  render(); // 패널 날짜칸이 임시로 바뀐 값을 보여주고 있었다면 원래 값으로 되돌림
}

/* ---------- 렌더 ---------- */
function render(){
  document.getElementById('addForm').style.display=editUnlocked?'flex':'none';
  document.getElementById('lockNotice').style.display=editUnlocked?'none':'flex';
  document.getElementById('editBtn').textContent=editUnlocked?'🔓 편집 중 (잠그기)':'🔒 편집 권한';
  const isoCase=isolate?cases.find(c=>c.id===isolate):null;
  if(!isoCase)isolate=null; // 대상이 사라졌으면 isolate 해제
  document.getElementById('calTitle').textContent = isoCase
    ? `${isoCase.name} 전체 일정`
    : `${vy}년 ${vm+1}월`;
  document.getElementById('isolateBtn').style.display = isoCase ? 'inline-flex' : 'none';
  const grid=document.getElementById('grid');grid.innerHTML='';

  // 케이스별 순번/라벨(다이어트는 차수에 따라 동적)은 한 번만 계산해 재사용
  const schMap={};
  cases.forEach(c=>schMap[c.id]=schemaBuild(c));

  const byDay={};     // 화면에 표시할 칩(현재 필터 적용됨)
  const byDayAll={};  // 탕전 정원 초과 알림 계산용 — 현재 필터와 무관하게 항상 탕전 전체 집계
  cases.forEach(c=>{
    if(isolate&&c.id!==isolate)return; // isolate 중엔 그 사람만 표시
    schMap[c.id].order.forEach(role=>{
      const m=schMap[c.id].meta[role];
      // isolate 중인 사람은 평소 캘린더에 숨겨지는 픽업·복용시작 등도 전부 노출
      if(m.calHidden && c.id!==isolate)return;
      if(m.kind==='brew')(byDayAll[c[role]] ||= []).push({c,role});
      if(filter==='brew'&&m.kind!=='brew')return;
      if(filter==='consult'&&m.kind!=='consult')return;
      (byDay[c[role]] ||= []).push({c,role});
    });
  });

  // 이동(딜레이) 여부도 케이스별로 한 번만 계산해 재사용
  const chainMap={};
  cases.forEach(c=>chainMap[c.id]=computeChain(c,schMap[c.id]));

  const first=new Date(vy,vm,1);
  const start=new Date(vy,vm,1-first.getDay());
  const todayStr=ymd(now);
  const over=[];

  for(let i=0;i<42;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const ds=ymd(d),inM=d.getMonth()===vm;
    const items=byDay[ds]||[];
    const brew=(byDayAll[ds]||[]).length;
    if(brew>MAX&&inM)over.push({date:ds,cnt:brew});

    const cell=document.createElement('div');
    cell.className='cell'+(inM?'':' mute')+(ds===todayStr?' today':'')+(d.getDay()===0?' sun':'')+(brew>MAX?' over':'');
    cell.dataset.date=ds;

    let h=`<span class="num">${d.getDate()}</span>`;
    if(brew>0){const cl=brew>MAX?'bad':(brew===MAX?'warn':'');h+=`<span class="cnt ${cl}">탕전 ${brew}</span>`;}
    h+='<div class="chips">';
    items.sort((a,b)=>{
      const order = chipOrder[ds];
      if(order){
        const ka = a.c.id+':'+a.role, kb = b.c.id+':'+b.role;
        const ia = order.indexOf(ka), ib = order.indexOf(kb);
        if(ia!==-1 && ib!==-1) return ia-ib;
        if(ia!==-1) return -1;
        if(ib!==-1) return 1;
      }
      return schMap[a.c.id].order.indexOf(a.role)-schMap[b.c.id].order.indexOf(b.role);
    });
    items.forEach(({c,role})=>{
      const m=schMap[c.id].meta[role];
      const fam=famOf(c.type);
      const info=chainMap[c.id][role];
      const isPhone=m.kind==='consult'&&phoneOn(c,role);
      const moved=info.moved&&!isPhone;
      let tip='';
      if(moved){const[,mm,dd]=info.expected.split('-');tip=` data-tip="정상 간격상 ${+mm}/${+dd} · ${info.delta>0?'+':''}${info.delta}일 이동"`;}
      const isBrew=isBrewKind(m.kind);
      const dot=`<span class="dot${(isBrew||isPhone)?' dot-hidden':' dot-'+fam}"></span>`;
      const phoneTag=isPhone?`<span class="phone-tag">전화상담</span>`:'';
      h+=`<div class="chip fam-${fam}${isBrew?' fill-'+fam:''}${isPhone?' phone':''}${moved?' moved':''}" draggable="${editUnlocked}" data-cid="${c.id}" data-role="${role}" data-date="${ds}"${tip}>
        ${dot}<span class="who">${c.name}</span><span class="role">${m.label}</span>${phoneTag}</div>`;
    });
    h+='</div>';
    cell.innerHTML=h;grid.appendChild(cell);
  }

  bindDrag();renderAlerts(over);renderPanel();
}

function renderAlerts(over){
  const box=document.getElementById('alerts');
  if(!over.length){box.innerHTML='';return;}
  const list=over.map(o=>`${o.date.slice(5).replace('-','/')} (${o.cnt}건)`).join(', ');
  box.innerHTML=`<div class="alert"><span class="dot"></span>
    <b>탕전 정원 초과</b><span>${list} — 하루 ${MAX}건을 넘겼어요. 칩을 다른 날로 옮겨 분산해 주세요.</span></div>`;
}

/* ---------- 드래그 바인딩 ---------- */
let drag=null;
function bindDrag(){
  document.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('dragstart',e=>{
      if(!editUnlocked){e.preventDefault();return;}
      drag={cid:+ch.dataset.cid,role:ch.dataset.role,date:ch.dataset.date};
      ch.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    ch.addEventListener('dragend',()=>{ch.classList.remove('dragging');drag=null;});
    ch.addEventListener('click',()=>openCase(+ch.dataset.cid));
    // 이름 부분만이 아니라 칩 전체에서 우클릭이 되도록(클릭 정확도 문제 방지)
    ch.addEventListener('contextmenu',e=>{
      e.preventDefault();e.stopPropagation();
      showCtxMenu(e.clientX,e.clientY,+ch.dataset.cid);
    });
    // 칩 위로 드래그해서 놓으면: 같은 날짜면 순서 변경, 다른 날짜면 기존처럼 날짜 이동
    ch.addEventListener('dragover',e=>{ e.preventDefault(); e.stopPropagation(); });
    ch.addEventListener('drop',e=>{
      e.preventDefault(); e.stopPropagation();
      if(!drag) return;
      const targetDate = ch.dataset.date;
      const targetKey = ch.dataset.cid+':'+ch.dataset.role;
      const dragKey = drag.cid+':'+drag.role;
      if(dragKey===targetKey) return;
      if(drag.date===targetDate){
        reorderWithinDay(targetDate, dragKey, targetKey, e.clientY, ch);
      } else {
        moveChip(drag.cid, drag.role, targetDate);
      }
    });
  });
  document.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('dragover');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('dragover'));
    cell.addEventListener('drop',e=>{
      e.preventDefault();cell.classList.remove('dragover');
      if(!drag) return;
      if(drag.date===cell.dataset.date){
        // 같은 날짜 안에서 칩과 칩 사이 빈 틈에 놓아도 가장 가까운 칩 기준으로 순서를 바꾼다
        const chips = Array.from(cell.querySelectorAll('.chip'));
        if(!chips.length) return;
        let target = chips[chips.length-1];
        for(const el of chips){
          const r = el.getBoundingClientRect();
          if(e.clientY < r.top + r.height/2){ target = el; break; }
        }
        const targetKey = target.dataset.cid+':'+target.dataset.role;
        const dragKey = drag.cid+':'+drag.role;
        if(dragKey!==targetKey) reorderWithinDay(cell.dataset.date, dragKey, targetKey, e.clientY, target);
        return;
      }
      moveChip(drag.cid,drag.role,cell.dataset.date);
    });
  });
}

/* ---------- 네비 ---------- */
function move(n){vm+=n;if(vm<0){vm=11;vy--;}if(vm>11){vm=0;vy++;}render();}
function jumpToday(){vy=now.getFullYear();vm=now.getMonth();render();}
function setFilter(f){filter=f;document.querySelectorAll('.views button').forEach(b=>b.classList.toggle('on',b.dataset.f===f));render();}

/* ---------- 환자 이름 우클릭 메뉴 · 그 사람만 캘린더에 isolate / 전체 삭제 ---------- */
function showCtxMenu(x,y,cid){
  const m=document.getElementById('ctxMenu');
  m.innerHTML=`<button onclick="isolateCase(${cid})">모두 보기</button>`+
    (editUnlocked?`<button class="danger" onclick="deleteCase(${cid})">모두 삭제하기</button>`:'');
  m.style.left=x+'px';m.style.top=y+'px';m.style.display='block';
}
function hideCtxMenu(){document.getElementById('ctxMenu').style.display='none';}
function isolateCase(id){
  isolate=id;hideCtxMenu();
  const c=cases.find(x=>x.id===id);
  if(c){const d=parse(c.처방);vy=d.getFullYear();vm=d.getMonth();}
  render();
}
// 돌아가기: isolate 해제하고 오늘 날짜 기준 달로 복귀
function clearIsolate(){
  isolate=null;
  vy=now.getFullYear();vm=now.getMonth();
  render();
}

/* ---------- 기준일(처방일) 기준 스케줄 안내 팝업 ----------
   원본 스케줄표(3단: 일차/일정/IS·HS)를 그대로 재현 — 처방일부터 하루하루 다 펼쳐서
   "복용 며칠째에 뭘 하는지"가 한눈에 보이게 함. */
function buildDayByDayRows(type,cycles){
  const T='2026-01-01';
  const sch=SCHEMA[type].build(T,cycles);
  const roleByDate={};
  sch.order.forEach(role=>{(roleByDate[sch.data[role]] ||= []).push(role);});
  const lastRole=sch.order[sch.order.length-1];
  const totalDays=diff(sch.data[lastRole],T);
  const markLabel=type==='다이어트'?'IS':'HS';
  const rows=[];
  let voidN=0,started=false,batchNo=0,batchStart=null,lastPushedPhase=null;
  for(let i=0;i<=totalDays;i++){
    const dstr=addDays(T,i);
    const roles=roleByDate[dstr]||[];
    const startRole=roles.find(r=>r.startsWith('start'));
    if(startRole){
      started=true;batchNo=Number(startRole.replace('start',''));batchStart=dstr;
    }
    const eventRoles=roles.filter(r=>!r.startsWith('start'));
    const event=eventRoles.map(r=>sch.meta[r].label).join(', ');
    const isConsult=eventRoles.some(r=>sch.meta[r].kind==='consult')||(i===0&&type==='다이어트');
    let day,phase;
    if(started){day=`${diff(dstr,batchStart)+1}일차`;phase=`${batchNo}차 탕약`;}
    else if(i===0){day='상담일';phase='처방';}
    else if(type==='다이어트'){voidN++;day=`비움기 ${voidN}일`;phase='비움기';}
    else {day='';phase='처방·준비';}
    const phaseStart=phase!==lastPushedPhase;
    lastPushedPhase=phase;
    rows.push({day,event,mark:isConsult?markLabel:'',phase,phaseStart});
    // 2차 탕약 마지막 복용일까지만 보여주면 충분 — 3차가 시작되기 전(3차 픽업 등은 2차 구간에 포함)까지 자르기
    if(batchNo===2 && i<totalDays){
      const next=roleByDate[addDays(T,i+1)]||[];
      if(next.some(r=>r==='start3'))break;
    }
  }
  return rows;
}
// 한 칸=하루가 그대로 유지되도록, 구간이 바뀌어도 별도 행을 끼워넣지 않고
// 그 날의 행 자체에 굵은 윗선 + 구간명을 살짝 붙여서만 표시한다(시간 흐름이 끊기지 않게).
function buildRefHTML(type){
  const rows=buildDayByDayRows(type,3);
  const isDiet=type==='다이어트';
  const trs=rows.map(r=>{
    const cls=[r.event?'ref-hit':'',r.phaseStart?'ref-phase-start':''].filter(Boolean).join(' ');
    const dayCell=r.day;
    return `<tr${cls?` class="${cls}"`:''}><td>${dayCell}</td><td>${r.event}</td><td>${r.mark}</td></tr>`;
  }).join('');
  return `<div class="ref-col-head${isDiet?' ref-diet':''}">${type} 한약</div>
    <table class="ref-table-daily${isDiet?' ref-diet':''}">${trs}</table>`;
}
// 일반/다이어트를 좌우 2단으로 나란히 — 탭 전환 없이 한눈에 비교
function showRefModal(){
  document.getElementById('refContent').innerHTML=`
    <div class="ref-cols">
      <div class="ref-col">${buildRefHTML('일반')}</div>
      <div class="ref-col">${buildRefHTML('다이어트')}</div>
    </div>`;
  document.getElementById('refModal').classList.add('open');
}
function hideRefModal(){document.getElementById('refModal').classList.remove('open');}
function deleteCase(id){
  hideCtxMenu();
  if(!requireEdit())return;
  const c=cases.find(x=>x.id===id);if(!c)return;
  if(!confirm(`"${c.name}" 일정을 모두 삭제할까요?\n되돌릴 수 없어요.`))return;
  cases=cases.filter(x=>x.id!==id);
  if(selected===id)selected=null;
  if(isolate===id)isolate=null;
  render();
  persistDeleteCase(id);
}
document.addEventListener('click',hideCtxMenu);
document.addEventListener('scroll',hideCtxMenu,true);

/* ---------- 상세 패널 ---------- */
function openCase(id){selected=id;renderPanel();}
function closeCase(){selected=null;renderPanel();}
function renderPanel(){
  const p=document.getElementById('panel');
  const c=cases.find(x=>x.id===selected);
  if(!c){selected=null;p.className='panel';p.innerHTML='';return;}
  const sch=schemaBuild(c);
  const tag=c.type==='다이어트'?'t-diet':(c.type==='상비약'?'t-stock':'t-gen');
  const tagLabel=c.type==='상비약'?'상비약':`${c.type} 한약`;
  const chain=computeChain(c,sch);
  const dose=computeDoseDays(c,sch);
  let h=`<div class="p-head">
      <div>
        <div style="display:flex;align-items:baseline;gap:7px">
          <div class="p-name">${c.name}</div>${c.dob?`<span class="p-dob-inline">${c.dob}</span>`:''}
        </div>
        <span class="p-tag ${tag}">${tagLabel}</span>
      </div>
      <button class="p-x" onclick="closeCase()">×</button>
    </div>
    <div class="p-list">`;
  sch.order.forEach(role=>{
    const m=sch.meta[role];
    const info=chain[role];
    const isConsultRole=m.kind==='consult';
    const phoneActive=isConsultRole&&phoneOn(c,role);
    const cur=info.actual;
    const dow='일월화수목금토'[parse(cur).getDay()];
    const ds=dose[role];
    const day=ds?`<span class="p-day">${ds.no}차 복용 ${ds.day}일차</span>`:'';
    let mv='';
    if(info.moved&&!phoneActive){
      // 픽업은 "일정이 밀렸다"보다 "따로 수정됐다"는 뉘앙스라 문구를 다르게 표시
      mv = role.startsWith('pickup')
        ? `<div class="p-move">변경됨</div>`
        : `<div class="p-move">정상 간격보다 ${info.delta>0?'+':''}${info.delta}일 밀림</div>`;
    }
    const phoneBtn=isConsultRole
      ?`<button class="phone-toggle${phoneActive?' on':''}" onclick="event.stopPropagation();togglePhone(${c.id},'${role}')"${editUnlocked?'':' disabled'}><span class="ptg-dot"></span>미내원</button>`
      :'';
    h+=`<div class="p-row">
      <span class="p-dot dot-${famOf(c.type)}"></span>
      <div class="p-main">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="p-label">${m.label}</div>
          ${phoneBtn}
        </div>
        ${mv}
      </div>
      <div class="p-dosecol">${day}</div>
      <div class="p-date">
        <input type="date" class="p-date-input" value="${cur}" onchange="moveChip(${c.id},'${role}',this.value)"${editUnlocked?'':' disabled'}>
        <span class="p-dow">${dow}</span>
      </div>
    </div>`;
  });
  h+='</div>';
  if(c.type!=='상비약'){
    const n=c.cycles||2;
    const canRemove=n>SCHEMA[c.type].minCycles&&editUnlocked;
    h+=`<div style="display:flex;gap:8px;margin-top:18px">
      <button class="p-btn ghost" style="flex:1" onclick="removeCycle(${c.id})"${canRemove?'':' disabled'}>− 이전 차수 삭제</button>
      <button class="p-btn" style="flex:1" onclick="addCycle(${c.id})"${editUnlocked?'':' disabled'}>＋ 다음 차수 추가</button>
    </div>`;
  }
  h+=`<div class="p-sub">메모</div>
    <textarea id="p-memo-input" class="p-memo" placeholder="메모를 남겨보세요" onchange="saveMemo(${c.id},this.value)"${editUnlocked?'':' disabled'}>${c.memo||''}</textarea>
    <div class="p-memo-save-row">
      <button class="p-memo-save" onclick="saveMemoBtn(${c.id},this)"${editUnlocked?'':' disabled'}>저장</button>
    </div>`;
  p.innerHTML=h;p.className='panel open';
}
function saveMemo(id,memo){
  if(!requireEdit())return;
  const c=cases.find(x=>x.id===id);if(!c)return;
  c.memo=memo;
  persistMemo(id,memo);
}
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.className='toast';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),1800);
}
function saveMemoBtn(id,btn){
  if(!requireEdit())return;
  const c=cases.find(x=>x.id===id);if(!c)return;
  const ta=document.getElementById('p-memo-input');
  if(ta) c.memo=ta.value;
  persistMemo(id,c.memo);
  showToast('저장되었습니다');
}
function addCycle(id){
  if(!requireEdit())return;
  const c=cases.find(x=>x.id===id);if(!c)return;
  c.cycles=(c.cycles||2)+1;
  // 새로 나타나는 차수(브루/픽업/IS)는 정석 날짜로 초기화, 기존 날짜(이동된 것 포함)는 그대로 둔다
  const data=schemaBuild(c).data;
  const added={};
  Object.keys(data).forEach(k=>{if(!(k in c)){c[k]=data[k];added[k]=data[k];}});
  render();
  persistCycles(c.id,c.cycles);
  persistDates(c.id,added);
}
function removeCycle(id){
  if(!requireEdit())return;
  const c=cases.find(x=>x.id===id);if(!c)return;
  c.cycles=Math.max(SCHEMA[c.type].minCycles,(c.cycles||2)-1);
  render();
  persistCycles(c.id,c.cycles);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCase();});
// 패널이 열려 있을 때 패널 바깥(그리고 칩이 아닌 곳)을 클릭하면 패널을 닫고 캘린더로 복귀
document.addEventListener('click',e=>{
  const panel=document.getElementById('panel');
  if(!panel.classList.contains('open'))return;
  if(panel.contains(e.target))return; // 패널 내부 클릭은 무시
  if(e.target.closest('.chip'))return; // 칩 클릭은 openCase가 알아서 처리
  closeCase();
});

(function(){
  const days=['일','월','화','수','목','금','토'];
  const el=document.getElementById('todayLine');
  if(el) el.textContent=`${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
})();
Promise.all([loadFromDB(), loadChipOrder()]).then(render);
